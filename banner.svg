<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#fff">
    <circle cx="50" cy="50" r="1.5"/><circle cx="90" cy="50" r="1.5"/><circle cx="130" cy="50" r="1.5"/><circle cx="170" cy="50" r="1.5"/><circle cx="210" cy="50" r="1.5"/>
    <circle cx="50" cy="90" r="1.5"/><circle cx="90" cy="90" r="1.5"/><circle cx="130" cy="90" r="1.5"/><circle cx="170" cy="90" r="1.5"/><circle cx="210" cy="90" r="1.5"/>
    <circle cx="50" cy="130" r="1.5"/><circle cx="90" cy="130" r="1.5"/><circle cx="130" cy="130" r="1.5"/><circle cx="170" cy="130" r="1.5"/><circle cx="210" cy="130" r="1.5"/>
    <circle cx="990" cy="170" r="1.5"/><circle cx="1030" cy="170" r="1.5"/><circle cx="1070" cy="170" r="1.5"/><circle cx="1110" cy="170" r="1.5"/><circle cx="1150" cy="170" r="1.5"/>
    <circle cx="990" cy="210" r="1.5"/><circle cx="1030" cy="210" r="1.5"/><circle cx="1070" cy="210" r="1.5"/><circle cx="1110" cy="210" r="1.5"/><circle cx="1150" cy="210" r="1.5"/>
    <circle cx="990" cy="250" r="1.5"/><circle cx="1030" cy="250" r="1.5"/><circle cx="1070" cy="250" r="1.5"/><circle cx="1110" cy="250" r="1.5"/><circle cx="1150" cy="250" r="1.5"/>
  </g>

  <!-- Decorative lines -->
  <line x1="280" y1="240" x2="920" y2="240" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <line x1="300" y1="245" x2="900" y2="245" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Icon: beaker/lab flask -->
  <g transform="translate(180, 80)" filter="url(#glow)">
    <path d="M0 0 L8 0 L8 40 L28 80 L-20 80 L0 40 Z" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <path d="M-14 80 L22 80" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="4" cy="55" r="4" fill="#ffd200" opacity="0.6"/>
    <circle cx="-4" cy="65" r="3" fill="#f7971e" opacity="0.5"/>
    <circle cx="10" cy="68" r="2.5" fill="#ffd200" opacity="0.4"/>
  </g>

  <!-- Main title -->
  <text x="260" y="130" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#fff" letter-spacing="-1">
    Agent Skill Lab
  </text>

  <!-- Tagline -->
  <text x="262" y="175" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" fill="url(#textGlow)" opacity="0.9" letter-spacing="0.5">
    Curated plugins to give your AI agent engineering discipline
  </text>

  <!-- Badges -->
  <g transform="translate(262, 200)">
    <rect width="140" height="28" rx="14" fill="#fff" opacity="0.08"/>
    <text x="70" y="18" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">Claude Code Plugin</text>
  </g>
  <g transform="translate(416, 200)">
    <rect width="100" height="28" rx="14" fill="#fff" opacity="0.08"/>
    <text x="50" y="18" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle" letter-spacing="0.5">Open Source</text>
  </g>
  <g transform="translate(530, 200)">
    <rect width="110" height="28" rx="14" fill="#fff" opacity="0.08"/>
    <text x="55" y="18" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" letter-spacing="0.5">Spec-First Dev</text>
  </g>
</svg>
